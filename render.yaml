services:
  - type: web
    name: carrom-tournament-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carrom-tournament-db
          property: connectionString
      - key: ADMIN_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
        # Set to your Vercel URL, e.g. https://your-app.vercel.app

databases:
  - name: carrom-tournament-db
    plan: free
